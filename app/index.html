<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>ImageDiff — найди отличия</title>
  <meta name="theme-color" content="#0f1216">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="ImageDiff">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>ImageDiff</h1>
    <p class="tagline">Подсветит отличия на двух картинках автоматически</p>
  </header>

  <main>
    <!-- Зона загрузки -->
    <section id="dropzone" class="dropzone" tabindex="0" aria-label="Загрузить картинку">
      <input id="file" type="file" accept="image/*" hidden>
      <div class="dropzone-inner">
        <div class="dz-icon">🖼️</div>
        <p><strong>Перетащите картинку сюда</strong></p>
        <p class="muted">или нажмите, чтобы выбрать · можно вставить из буфера (Cmd/Ctrl+V)</p>
      </div>
    </section>

    <!-- Результат -->
    <section id="result" class="result" hidden>
      <div class="canvas-wrap">
        <canvas id="canvas"></canvas>
      </div>

      <div class="status" id="status"></div>

      <div class="controls">
        <label class="control">
          Чувствительность
          <input id="sensitivity" type="range" min="1" max="100" value="60">
        </label>

        <label class="control">
          Ориентация
          <select id="orientation">
            <option value="auto">Авто</option>
            <option value="horizontal">Горизонтально</option>
            <option value="vertical">Вертикально</option>
          </select>
        </label>

        <button id="manual" class="btn ghost" disabled
                title="Аварийный режим: вручную обвести две панели. Появится в следующей версии.">
          Выделить вручную
        </button>

        <span class="spacer"></span>

        <button id="save" class="btn">Сохранить</button>
        <button id="reset" class="btn ghost">Другая картинка</button>
      </div>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
